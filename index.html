            margin: 0;

            color: white;

            line-height: 1.2;
            overflow: visible !important;

            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);

        .active-section:hover {

            transform: translateX(10px);
            background: rgba(255, 255, 255, 0.05);

        .hover-card {

        }
        .hover-card:hover {
            transform: translateY(-12px) translateX(8px) scale(1.03);
            box-shadow: 0 40px 80px -20px rgba(0,0,0,0.8);
        }

        .glass-nav {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            background: rgba(0, 0, 0, 0.7);
        }

        @keyframes menuIn { from { transform: translateY(-15px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        @keyframes subMenuIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

        @keyframes modalIn { from { transform: scale(0.9) translateY(20px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }

                                            <div className="absolute inset-0 bg-gradient-to-t from-black/90 via-black/30 to-transparent z-10"></div>
                                            <div className="relative z-20 p-6 sm:p-8 text-white text-left break-words w-full">
                                                <h4 className="text-2xl sm:text-3xl font-black mb-1 leading-none">{isEn ? m.en.name : m.zh.name}</h4>
                                                <p className="text-emerald-400 font-bold text-xs tracking-widest uppercase mb-4">{isEn ? m.en.dept : m.zh.dept}</p>
                                                <div className="pt-6 mt-6 border-t border-white/10 flex items-center justify-between opacity-60 group-hover:opacity-100 transition-opacity font-black text-[9px] tracking-widest uppercase">Profile &rarr;</div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {view === 'introDetail' && (
                            <div className="animate-in max-w-6xl mx-auto pb-32 overflow-visible px-2 text-left text-current">
                                <button onClick={() => handleNavigate('home')} className="flex items-center justify-start gap-4 mb-20 opacity-50 hover:opacity-100 font-bold uppercase tracking-widest transition-all"><Icons.ArrowLeft size={20} /> {currentUI.back}</button>
                                <h1 className={`text-4xl sm:text-7xl font-black mb-16 text-gradient bg-gradient-to-r ${isDarkMode ? 'from-white via-blue-400 to-blue-600' : 'from-black via-blue-700 to-blue-950'} tracking-tighter uppercase leading-tight`}>{isEn ? "Course Introduction" : "課程簡介"}</h1>
                                
                                <div className="space-y-16 mb-24 text-current">
                                    {detailedSections.map(sec => (
                                        <div key={sec.id} className={`active-section p-10 sm:p-16 rounded-[4rem] border border-transparent shadow-xl transition-colors duration-700 ${isDarkMode ? 'hover:bg-white/5 text-white' : 'hover:bg-slate-200/50 text-slate-900'}`}>
                                            <div className="flex items-center gap-8 mb-10 overflow-visible text-current">
                                                <div className="p-3 bg-slate-500/10 rounded-2xl shrink-0 text-current">{React.cloneElement(sec.icon, { size: 40 })}</div>
                                                <h2 className={`text-xl sm:text-4xl md:text-5xl font-black tracking-tight leading-tight whitespace-normal text-current`}>{isEn ? sec.en.title : sec.zh.title}</h2>
                                            </div>
                                            <h3 className={`text-xl sm:text-[2.2rem] font-black mb-8 italic border-b pb-6 leading-tight transition-colors duration-700 ${isDarkMode ? 'text-[#00ffff] border-white/10' : 'text-cyan-600 border-black/10'}`}>
                                                {isEn ? sec.en.subtitle : sec.zh.subtitle}
                                            </h3>
                                            <div className={`text-lg sm:text-2xl leading-relaxed whitespace-pre-line font-medium italic transition-colors duration-700 ${isDarkMode ? 'text-white/90' : 'text-slate-800'}`}>{isEn ? sec.en.content : sec.zh.content}</div>
                                        </div>
                                    ))}
                                </div>

                                {/* --- 測驗系統 UI 更新 --- */}
                                <div id="quiz-section" className={`scroll-mt-32 p-10 sm:p-16 rounded-[4rem] border shadow-2xl relative overflow-hidden transition-colors duration-700 ${isDarkMode ? 'bg-indigo-600/5 text-white border-white/10' : 'bg-indigo-50 text-slate-900 border-indigo-100'}`}>
                                    <div className="flex flex-col items-center mb-12 text-current text-center">
                                        <div className="w-16 h-16 rounded-full bg-indigo-500/20 flex items-center justify-center text-indigo-400 mb-6 animate-pulse"><Help size={32} /></div>
                                        <h2 className="text-3xl sm:text-5xl font-black text-center tracking-tight">{isEn ? "Knowledge Check" : "互動式問答挑戰"}</h2>
                                        {!isQuizFinished && (
                                            <p className="opacity-50 mt-4 font-bold text-sm uppercase tracking-widest">{isEn ? `Set ${quizPage + 1} of 3` : `第 ${quizPage + 1} 組測驗 / 共 3 組`}</p>
                                        )}
                                    </div>

                                    {isQuizFinished ? (
                                        // 總分結算畫面
                                        <div className={`p-10 sm:p-16 rounded-[3rem] border text-center shadow-lg transition-all duration-700 ${isDarkMode ? 'bg-black/40 border-white/5' : 'bg-white border-black/5'}`}>
                                            <div className="w-20 h-20 mx-auto rounded-full bg-indigo-500/20 flex items-center justify-center text-indigo-400 mb-8"><Target size={40} /></div>
                                            <h3 className="text-3xl sm:text-4xl font-black mb-8">{currentUI.quizResults}</h3>
                                            <div className="flex flex-col items-center justify-center mb-12 gap-4">
                                                <div className="text-6xl sm:text-7xl font-black text-emerald-500 leading-none">
                                                    {calculateScore()} <span className="text-3xl sm:text-4xl text-current opacity-50">/ {quizData.length}</span>
                                                </div>
                                                <div className="text-2xl sm:text-3xl font-black text-emerald-400 bg-emerald-500/10 px-6 py-2 rounded-full border border-emerald-500/20 shadow-inner">
                                                    {Math.round((calculateScore() / quizData.length) * 100)}%
                                                </div>
                                            </div>
                                            <button onClick={resetQuiz} className="px-10 py-4 rounded-full bg-gradient-to-r from-indigo-600 to-blue-600 font-black uppercase tracking-[0.2em] shadow-xl hover:scale-105 active:scale-95 transition-all text-white mx-auto flex items-center gap-3">
                                                {currentUI.quizRetry} <ChevronRight />
                                            </button>
                                        </div>
                                    ) : (
                                        // 答題畫面
                                        <>
                                            <div className="space-y-12 text-current">
                                                {displayedQuestions.map((q) => (
                                                    <div key={q.id} className={`p-8 sm:p-10 rounded-[3rem] border transition-all duration-700 ${isDarkMode ? 'bg-black/40 border-white/5' : 'bg-white border-black/5 shadow-lg'}`}>
                                                        <h4 className="text-xl sm:text-2xl font-bold mb-8 leading-relaxed text-left text-current">{q[lang].q}</h4>
                                                        <div className="grid grid-cols-1 gap-4">
                                                            {q[lang].options.map((opt, idx) => {
                                                                const userChoiceIdx = userAnswers[q.id];
                                                                const isRevealed = userChoiceIdx !== undefined;
                                                                const isSelected = userChoiceIdx === idx;
                                                                const isCorrect = opt.correct;
                                                                
                                                                let btnClass = isDarkMode ? "bg-white/5 border-white/5 hover:bg-white/10 text-white" : "bg-slate-50 border-slate-100 hover:bg-slate-100 text-slate-900";
                                                                if (isRevealed) {
                                                                    if (isCorrect) btnClass = "bg-emerald-500/20 border-emerald-500 text-emerald-400 shadow-[0_0_20px_rgba(16,185,129,0.2)]";
                                                                    else if (isSelected) btnClass = "bg-rose-500/20 border-rose-500 text-rose-400 shadow-[0_0_20px_rgba(244,63,94,0.2)]";
                                                                    else btnClass = isDarkMode ? "opacity-30 grayscale" : "opacity-30 bg-slate-200 text-slate-400";
                                                                }
                                                                
                                                                return (
                                                                    <div key={idx} className="space-y-2 text-left">
                                                                        <button disabled={isRevealed} onClick={() => handleQuizAnswer(q.id, idx)} className={`w-full text-left p-5 rounded-2xl border transition-all flex items-start gap-4 group ${btnClass}`}>
                                                                            <span className={`w-8 h-8 rounded-lg flex items-center justify-center font-black shrink-0 ${isSelected ? (isDarkMode ? 'bg-white text-black' : 'bg-slate-900 text-white') : (isDarkMode ? 'bg-white/10 text-blue-400' : 'bg-slate-200 text-blue-600')}`}>
                                                                                {opt.label}
                                                                            </span>
                                                                            <span className="font-semibold text-base sm:text-lg leading-snug">{opt.text}</span>
                                                                        </button>
                                                                        
                                                                        {isRevealed && (
                                                                            <div className="animate-in slide-in-from-top-2 duration-300">
                                                                                {isCorrect && (
                                                                                    <div className="mt-2 p-6 rounded-2xl bg-emerald-500/10 border border-emerald-500/20 text-left">
                                                                                        <div className="flex items-center gap-2 mb-2 text-current font-black"><span className="text-emerald-400">✅ {isEn ? "Correct Answer Logic" : "正確答案解析"}</span></div>
                                                                                        <p className={`text-sm sm:text-base opacity-95 leading-relaxed italic transition-colors duration-700 ${!isDarkMode && 'text-slate-800'}`}>{opt.expl}</p>
                                                                                    </div>
                                                                                )}
                                                                                {isSelected && !isCorrect && (
                                                                                    <div className="mt-2 p-6 rounded-2xl bg-rose-500/10 border border-rose-500/20 text-left">
                                                                                        <div className="flex items-center gap-2 mb-2 text-current font-black"><span className="text-rose-400">❌ {isEn ? "Your Choice Analysis" : "您的選項解析"}</span></div>
                                                                                        <p className={`text-sm sm:text-base opacity-95 leading-relaxed italic transition-colors duration-700 ${!isDarkMode && 'text-slate-800'}`}>{opt.expl}</p>
                                                                                    </div>
                                                                                )}
                                                                            </div>
                                                                        )}
                                                                    </div>
                                                                );
                                                            })}
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                            <div className="mt-16 text-center">
                                                <button onClick={nextQuizPage} className="px-12 py-5 rounded-full bg-gradient-to-r from-indigo-600 to-blue-600 font-black uppercase tracking-[0.2em] shadow-2xl hover:scale-105 active:scale-95 transition-all flex items-center gap-4 mx-auto group text-white">
                                                    {quizPage === 2 ? currentUI.quizFinish : (isEn ? "Continue Challenge" : "繼續挑戰題目")} <ChevronRight className="group-hover:translate-x-1 transition-transform" />
                                                </button>
                                            </div>
                                        </>
                                    )}
                                </div>
                            </div>
                        )}

                        {(view === 'part1' || view === 'part2') && (
                            <div className="animate-in pb-24 text-left text-current">
                                <button onClick={() => handleNavigate('home')} className="flex items-center justify-start gap-4 mb-16 opacity-50 hover:opacity-100 font-bold uppercase tracking-widest transition-all text-current"><Icons.ArrowLeft size={20} /> {currentUI.back}</button>
                                <div className={`mb-24 p-10 sm:p-16 rounded-[4rem] shadow-2xl border transition-colors duration-700 ${isDarkMode ? 'bg-white/5 border-white/10' : 'bg-white border-black/5'}`}>
                                    <h2 className="text-3xl sm:text-6xl font-black mb-10 text-gradient bg-gradient-to-r from-blue-400 to-indigo-500">{view === 'part1' ? currentUI.part1Header : currentUI.part2Header}</h2>
                                    <div className={`space-y-10 text-lg sm:text-2xl leading-relaxed font-medium italic text-left text-current`}>
                                        <p className={`transition-colors duration-700 ${isDarkMode ? 'text-white/90' : 'text-slate-800'}`}>{isEn ? (view === 'part1' ? uiText.en.part1SyllabusDesc : uiText.en.part2SyllabusDesc) : (view === 'part1' ? uiText.zh.part1SyllabusDesc : uiText.zh.part2SyllabusDesc)}</p>
                                    </div>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 text-current text-left text-current">
                                    {allLectures.filter(l => (view === 'part1' ? l.part === 1 : l.part === 2)).map(l => (
                                        <div key={l.id} onClick={() => handleNavigateToLN(l)} className={`hover-card group p-12 rounded-[3.5rem] border transition-all duration-700 cursor-pointer flex flex-col justify-between min-h-[520px] shadow-2xl ${isDarkMode ? 'bg-[#0e0e12] border-white/5 hover:border-blue-500/30' : 'bg-white border-black/5 hover:border-blue-400'}`}>
                                            <div>
                                                <div className={`w-16 h-16 rounded-2xl bg-gradient-to-br ${l.color} flex items-center justify-center text-white font-black text-2xl mb-12 shadow-lg transform group-hover:rotate-6 transition-transform`}>{l.id}</div>
                                                <h3 className={`text-2xl sm:text-3xl font-bold mb-4 tracking-tight leading-tight group-hover:text-blue-500 transition-colors duration-700 ${isDarkMode ? 'text-white' : 'text-slate-900'}`}>{isEn ? l.title_en : l.title_zh}</h3>
                                                <p className="text-sm opacity-40 italic mb-10 leading-relaxed text-current">"{isEn ? l.quote_en : l.quote_zh}"</p>
                                                <div className={`w-16 h-1.5 rounded-full bg-gradient-to-r from-blue-500 to-indigo-500 mb-8 group-hover:w-full transition-all duration-700`}></div>
                                                <p className="text-xs font-black opacity-60 uppercase tracking-[0.3em]">{isEn ? l.tag_en : l.tag_zh}</p>
                                            </div>
                                            <div className="pt-10 border-t border-white/5 flex items-center justify-between transition-all text-current"><span className="flex items-center gap-3 text-sm font-black text-amber-500 uppercase tracking-[0.2em] italic animate-pulse"><Clock /> {currentUI.statusComing}</span><ChevronRight size={24} className="opacity-20 group-hover:opacity-100 group-hover:translate-x-3 transition-all" /></div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {view === 'detail' && activeModule && (
                            <div className="animate-in slide-in-from-bottom-5 duration-700 text-left text-current">
                                <button onClick={() => setView(activeModule.part === 1 ? 'part1' : 'part2')} className="flex items-center justify-start gap-4 mb-16 opacity-50 hover:opacity-100 font-bold uppercase tracking-widest text-current"><Icons.ArrowLeft size={20} /> Back to List</button>
                                <div className={`p-16 rounded-[4rem] border shadow-2xl transition-colors duration-700 ${isDarkMode ? 'bg-[#0a0a0c] border-white/10 text-white' : 'bg-white shadow-xl text-slate-900'}`}>
                                    <div className="flex flex-col md:flex-row items-start md:items-center gap-10 mb-16 text-current text-left">
                                        <div className={`w-24 h-24 rounded-3xl bg-gradient-to-br ${activeModule.color} flex items-center justify-center text-white text-4xl font-black shadow-2xl`}>{activeModule.id}</div>
                                        <div className="min-w-0">
                                            <span className="text-blue-500 font-black text-[10px] tracking-widest uppercase mb-2 block tracking-[0.4em]">INTERACTIVE MODULE</span>
                                            <h2 className={`text-4xl sm:text-6xl font-black leading-tight break-words pb-4`}>{isEn ? activeModule.title_en : activeModule.title_zh}</h2>
                                            <p className={`opacity-50 text-2xl italic mt-1 font-medium leading-relaxed`}>"{isEn ? activeModule.quote_en : activeModule.quote_zh}"</p>
                                        </div>
                                    </div>
                                    <div className="min-h-[400px] flex items-center justify-center border-2 border-dashed border-slate-500/20 rounded-[3rem] opacity-30 italic text-xl text-center text-current">
                                        [ Concept Lab Content Underway ]
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* --- Footer --- */}
                    <footer className={`py-12 border-t transition-colors duration-700 ${isDarkMode ? 'border-white/5 bg-black/95 text-white/40' : 'border-black/5 bg-slate-100 text-slate-500'}`}>
                        <div className="max-w-7xl mx-auto px-10 flex flex-col md:flex-row justify-between items-center md:items-end gap-12 md:gap-0 text-center md:text-left text-current font-black">
                            <div className="flex flex-col gap-4 items-center md:items-start text-xs font-black uppercase tracking-widest leading-none text-current text-left">
                                <span>{currentUI.footerCourse}</span>
                                <div className="flex gap-8 text-[11px] opacity-30 mt-2 text-current font-black"><span>v7.7.1</span><a href="https://www.ncnu.edu.tw/" target="_blank" rel="noreferrer" className="hover:text-blue-500 underline decoration-white/20 transition-colors">NCNU</a></div>
                            </div>
                            <div className="flex flex-col items-center md:items-end gap-4 text-center md:text-right text-current font-black">
                                <div className="flex gap-6 mb-2 text-[11px] font-bold uppercase tracking-widest text-current font-black">
                                    <a href="https://www.ibs.ncnu.edu.tw/index.php/faculty/tenured-professor/299-smlo" target="_blank" rel="noreferrer" className="opacity-60 hover:opacity-100 hover:text-purple-400 transition-all flex items-center gap-2">{currentUI.footerInstructor} <External size={12} /></a>
                                    <a href="https://www.ibs.ncnu.edu.tw/" target="_blank" rel="noreferrer" className={`opacity-60 hover:opacity-100 hover:text-blue-400 transition-all flex items-center gap-2`}>{currentUI.footerDept} <External size={12} /></a>
                                </div>
                                <p className="text-[10px] font-bold opacity-30 tracking-tight text-current font-black text-right">© 2026 International Strategic Management Portal</p>
                            </div>
                        </div>
                    </footer>

                    {/* Member Modal */}
                    {selectedMember && (
                        <div className="fixed inset-0 z-[200] flex items-center justify-center p-4 sm:p-6 bg-black/95 backdrop-blur-md transition-colors duration-700">
                            <div className={`modal-animate relative w-full max-w-5xl max-h-[92vh] rounded-[2rem] sm:rounded-[3rem] overflow-hidden flex flex-col lg:flex-row border shadow-[0_80px_160px_rgba(0,0,0,1)] text-left transition-colors duration-700 ${isDarkMode ? 'bg-[#0a0a0c] text-white border-white/10' : 'bg-white text-slate-900 border-slate-200'}`}>
                                <button onClick={() => setSelectedMember(null)} className="absolute top-4 right-4 sm:top-6 sm:right-6 z-50 p-2.5 rounded-full bg-black/50 text-white hover:bg-black/70 backdrop-blur-md transition-all"><X size={20} /></button>
                                <div className={`w-full lg:w-1/2 h-[300px] sm:h-[400px] lg:h-auto shrink-0 relative overflow-hidden flex items-center justify-center text-center transition-colors duration-700 ${isDarkMode ? 'bg-slate-900' : 'bg-slate-100'}`}>
                                    <div className={`absolute inset-0 flex items-center justify-center font-black text-[12rem] select-none leading-none transition-colors duration-700 ${isDarkMode ? 'text-white/10' : 'text-black/5'}`}>{selectedMember.initials}</div>
                                    {selectedMember.img && <img src={selectedMember.img} alt={isEn ? selectedMember.en.name : selectedMember.zh.name} onError={(e) => e.target.style.display='none'} className="absolute inset-0 w-full h-full object-cover z-0" />}
                                    <div className="absolute inset-0 bg-gradient-to-t from-black/90 via-black/30 to-black/10 z-10"></div>
                                    <div className="absolute bottom-6 left-6 sm:bottom-10 sm:left-10 z-20 text-white text-left">
                                        <h2 className="text-3xl sm:text-4xl lg:text-5xl font-black mb-2 leading-none text-left">{isEn ? selectedMember.en.name : selectedMember.zh.name}</h2>
                                        <div className="mt-1 sm:mt-2 space-y-1 sm:space-y-2">
                                            <p className="text-emerald-400 font-bold uppercase tracking-widest text-xs sm:text-sm text-left">{isEn ? selectedMember.en.dept : selectedMember.zh.dept}</p>
                                            {selectedMember.email && (
                                                <div className="inline-flex items-center gap-2 text-[10px] sm:text-xs font-medium text-white/80 transition-colors">
                                                    <Mail size={14} /> {selectedMember.email}
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                </div>
                                <div className="w-full lg:w-1/2 flex-1 p-6 sm:p-10 lg:p-16 overflow-y-auto no-scrollbar">
                                    <div className={`space-y-8 lg:space-y-12 text-left transition-colors duration-700 ${isDarkMode ? 'text-white/90' : 'text-slate-900'}`}>
                                        <div><h4 className={`text-[10px] font-black uppercase tracking-[0.4em] mb-4 sm:mb-6 text-left transition-colors duration-700 ${isDarkMode ? 'text-white/40' : 'text-slate-400'}`}>ABOUT</h4>
                                            <ul className="space-y-4 sm:space-y-5 text-left">{(isEn ? selectedMember.en.about : selectedMember.zh.about).map((line, i) => (
                                                <li key={i} className="text-base sm:text-lg font-medium opacity-90 leading-relaxed flex items-start gap-4 text-left"><span className="w-1.5 h-1.5 rounded-full bg-blue-600 mt-2.5 shrink-0 text-left"></span> {line}</li>
                                            ))}</ul>
                                        </div>
                                        <div>
                                            <h4 className={`text-[10px] font-black uppercase tracking-[0.4em] mb-4 sm:mb-6 text-left transition-colors duration-700 ${isDarkMode ? 'text-white/40' : 'text-slate-400'}`}>INTRO VIDEO</h4>
                                            {selectedMember.youtubeId ? (
                                                <a href={`https://youtu.be/${selectedMember.youtubeId}`} target="_blank" rel="noopener noreferrer" className={`block aspect-video rounded-[2rem] sm:rounded-[2.5rem] border relative overflow-hidden shadow-xl group cursor-pointer hover:shadow-2xl transition-all duration-500 ${isDarkMode ? 'bg-slate-900 border-white/10' : 'bg-slate-800 border-slate-700'}`}>
                                                    {selectedMember.ytThumbnail && (
                                                        <img src={selectedMember.ytThumbnail} alt={`${isEn ? selectedMember.en.name : selectedMember.zh.name} Video Thumbnail`} onError={(e) => e.target.style.display='none'} className="absolute inset-0 w-full h-full object-cover z-0 transition-transform duration-700 group-hover:scale-105" />
                                                    )}
                                                    <div className="absolute inset-0 bg-black/20 group-hover:bg-black/10 transition-colors duration-500 z-10"></div>
                                                    <div className="absolute inset-0 flex items-center justify-center z-20 text-white">
                                                        <div className="w-14 h-14 sm:w-16 sm:h-16 rounded-full bg-red-600 flex items-center justify-center group-hover:scale-110 transition-transform shadow-2xl shadow-red-500/20">
                                                            <Play />
                                                        </div>
                                                    </div>
                                                    <div className="absolute bottom-4 sm:bottom-6 right-4 sm:right-6 bg-black/60 backdrop-blur px-3 sm:px-4 py-1.5 rounded-full text-[8px] sm:text-[9px] font-bold tracking-[0.2em] uppercase text-white text-left z-20">
                                                        {isEn ? "Watch on YouTube" : "前往 YouTube 觀看"}
                                                    </div>
                                                </a>
                                            ) : (
                                                <div className={`aspect-video rounded-[2rem] sm:rounded-[2.5rem] border flex items-center justify-center group cursor-pointer hover:shadow-2xl transition-all relative overflow-hidden text-white ${isDarkMode ? 'bg-slate-900 border-white/10' : 'bg-slate-800 border-slate-700'}`}>
                                                    <div className="w-14 h-14 sm:w-16 sm:h-16 rounded-full bg-red-600 flex items-center justify-center group-hover:scale-110 transition-transform shadow-2xl shadow-red-500/20"><Play /></div>
                                                    <div className="absolute bottom-4 sm:bottom-6 right-4 sm:right-6 bg-black/60 backdrop-blur px-3 sm:px-4 py-1.5 rounded-full text-[8px] sm:text-[9px] font-bold tracking-[0.2em] uppercase text-white text-left text-current">poc presentation</div>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
